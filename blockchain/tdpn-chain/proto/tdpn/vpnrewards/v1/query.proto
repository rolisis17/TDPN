syntax = "proto3";

package tdpn.vpnrewards.v1;

option go_package = "github.com/tdpn/tdpn-chain/x/vpnrewards/types";

import "tdpn/vpnrewards/v1/types.proto";

service Query {
  rpc RewardAccrual(QueryRewardAccrualRequest) returns (QueryRewardAccrualResponse);
  rpc DistributionRecord(QueryDistributionRecordRequest) returns (QueryDistributionRecordResponse);
  rpc ListRewardAccruals(QueryListRewardAccrualsRequest) returns (QueryListRewardAccrualsResponse);
  rpc ListDistributionRecords(QueryListDistributionRecordsRequest) returns (QueryListDistributionRecordsResponse);
}

message QueryRewardAccrualRequest {
  string accrual_id = 1;
}

message QueryRewardAccrualResponse {
  RewardAccrual accrual = 1;
  bool found = 2;
}

message QueryDistributionRecordRequest {
  string distribution_id = 1;
}

message QueryDistributionRecordResponse {
  DistributionRecord distribution = 1;
  bool found = 2;
}

message QueryListRewardAccrualsRequest {}

message QueryListRewardAccrualsResponse {
  repeated RewardAccrual accruals = 1;
}

message QueryListDistributionRecordsRequest {}

message QueryListDistributionRecordsResponse {
  repeated DistributionRecord distributions = 1;
}
