syntax = "proto3";

package tdpn.vpngovernance.v1;

option go_package = "github.com/tdpn/tdpn-chain/x/vpngovernance/types";

import "tdpn/vpngovernance/v1/types.proto";

service Query {
  rpc GovernancePolicy(QueryGovernancePolicyRequest) returns (QueryGovernancePolicyResponse);
  rpc GovernanceDecision(QueryGovernanceDecisionRequest) returns (QueryGovernanceDecisionResponse);
  rpc GovernanceAuditAction(QueryGovernanceAuditActionRequest) returns (QueryGovernanceAuditActionResponse);
  rpc ListGovernancePolicies(QueryListGovernancePoliciesRequest) returns (QueryListGovernancePoliciesResponse);
  rpc ListGovernanceDecisions(QueryListGovernanceDecisionsRequest) returns (QueryListGovernanceDecisionsResponse);
  rpc ListGovernanceAuditActions(QueryListGovernanceAuditActionsRequest) returns (QueryListGovernanceAuditActionsResponse);
}

message QueryGovernancePolicyRequest {
  string policy_id = 1;
}

message QueryGovernancePolicyResponse {
  GovernancePolicy policy = 1;
  bool found = 2;
}

message QueryGovernanceDecisionRequest {
  string decision_id = 1;
}

message QueryGovernanceDecisionResponse {
  GovernanceDecision decision = 1;
  bool found = 2;
}

message QueryGovernanceAuditActionRequest {
  string action_id = 1;
}

message QueryGovernanceAuditActionResponse {
  GovernanceAuditAction action = 1;
  bool found = 2;
}

message QueryListGovernancePoliciesRequest {}

message QueryListGovernancePoliciesResponse {
  repeated GovernancePolicy policies = 1;
}

message QueryListGovernanceDecisionsRequest {}

message QueryListGovernanceDecisionsResponse {
  repeated GovernanceDecision decisions = 1;
}

message QueryListGovernanceAuditActionsRequest {}

message QueryListGovernanceAuditActionsResponse {
  repeated GovernanceAuditAction actions = 1;
}
