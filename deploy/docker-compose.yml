      ENTRY_MAX_CONCURRENT_OPENS: "${ENTRY_MAX_CONCURRENT_OPENS:-128}"
      ENTRY_OPERATOR_ID: "${ENTRY_OPERATOR_ID:-}"
      ENTRY_RELAY_ID: "${ENTRY_RELAY_ID:-entry-local-1}"
      EXIT_RELAY_ID: "${EXIT_RELAY_ID:-exit-local-1}"
      ENTRY_ROUTE_ASSERTION_PRIVATE_KEY: "${ENTRY_ROUTE_ASSERTION_PRIVATE_KEY:-}"
      ENTRY_ROUTE_ASSERTION_PRIVATE_KEY_FILE: "${ENTRY_ROUTE_ASSERTION_PRIVATE_KEY_FILE:-}"
      ENTRY_DIRECTORY_MIN_SOURCES: "${ENTRY_DIRECTORY_MIN_SOURCES:-1}"
      ENTRY_DIRECTORY_MIN_OPERATORS: "${ENTRY_DIRECTORY_MIN_OPERATORS:-1}"
      ENTRY_DIRECTORY_MIN_RELAY_VOTES: "${ENTRY_DIRECTORY_MIN_RELAY_VOTES:-1}"
      ENTRY_DIRECTORY_TRUST_STRICT: "${ENTRY_DIRECTORY_TRUST_STRICT:-0}"
      ENTRY_DIRECTORY_TRUST_TOFU: "${ENTRY_DIRECTORY_TRUST_TOFU:-0}"
      ENTRY_ALLOW_INSECURE_CONTROL_URL_HTTP: "${ENTRY_ALLOW_INSECURE_CONTROL_URL_HTTP:-0}"
      ENTRY_ALLOW_DANGEROUS_OUTBOUND_PRIVATE_DNS: "${ENTRY_ALLOW_DANGEROUS_OUTBOUND_PRIVATE_DNS:-0}"
      ENTRY_REQUIRE_DISTINCT_EXIT_OPERATOR: "${ENTRY_REQUIRE_DISTINCT_EXIT_OPERATOR:-0}"
      ENTRY_LIVE_WG_MODE: "${ENTRY_LIVE_WG_MODE:-0}"
      EXIT_REVOCATION_REFRESH_SEC: "15"
      EXIT_ISSUER_MIN_SOURCES: "${EXIT_ISSUER_MIN_SOURCES:-1}"
      EXIT_ISSUER_MIN_OPERATORS: "${EXIT_ISSUER_MIN_OPERATORS:-1}"
      EXIT_ISSUER_MIN_KEY_VOTES: "${EXIT_ISSUER_MIN_KEY_VOTES:-1}"
      EXIT_ISSUER_REQUIRE_ID: "${EXIT_ISSUER_REQUIRE_ID:-0}"
      EXIT_TRUSTED_ENTRY_ROUTE_ASSERTION_PUBKEYS: "${EXIT_TRUSTED_ENTRY_ROUTE_ASSERTION_PUBKEYS:-}"
      EXIT_ENTRY_ROUTE_ASSERTION_DIRECTORY_TRUST: "${EXIT_ENTRY_ROUTE_ASSERTION_DIRECTORY_TRUST:-0}"
      ENTRY_ALLOW_DANGEROUS_INSECURE_PUBLIC_BIND: "${ENTRY_ALLOW_DANGEROUS_INSECURE_PUBLIC_BIND:-0}"
      EXIT_ALLOW_INSECURE_CONTROL_URL_HTTP: "${EXIT_ALLOW_INSECURE_CONTROL_URL_HTTP:-0}"
      EXIT_ALLOW_DANGEROUS_INSECURE_PUBLIC_BIND: "${EXIT_ALLOW_DANGEROUS_INSECURE_PUBLIC_BIND:-0}"
      EXIT_ALLOW_DANGEROUS_OUTBOUND_PRIVATE_DNS: "${EXIT_ALLOW_DANGEROUS_OUTBOUND_PRIVATE_DNS:-0}"
      EXIT_ACCOUNTING_FILE: "/app/data/exit_accounting.json"
      EXIT_EGRESS_BACKEND: "${EXIT_EGRESS_BACKEND:-noop}"
      WG_BACKEND: "${WG_BACKEND:-noop}"
      EXIT_WG_INTERFACE: "${EXIT_WG_INTERFACE:-wg-exit0}"
      EXIT_WG_PRIVATE_KEY_PATH: "${EXIT_WG_PRIVATE_KEY_PATH:-/app/data/exit_wg.key}"
      EXIT_WG_PUBKEY: "${EXIT_WG_PUBKEY:-}"
      EXIT_WG_AUTO_CREATE_INTERFACE: "${EXIT_WG_AUTO_CREATE_INTERFACE:-0}"
      EXIT_WG_LISTEN_PORT: "${EXIT_WG_LISTEN_PORT:-51831}"
      EXIT_WG_KERNEL_PROXY: "${EXIT_WG_KERNEL_PROXY:-0}"
      EXIT_WG_KERNEL_PROXY_MAX_SESSIONS: "${EXIT_WG_KERNEL_PROXY_MAX_SESSIONS:-2048}"
      EXIT_WG_KERNEL_PROXY_IDLE_SEC: "${EXIT_WG_KERNEL_PROXY_IDLE_SEC:-120}"
      EXIT_LIVE_WG_MODE: "${EXIT_LIVE_WG_MODE:-0}"
      EXIT_OPAQUE_ECHO: "${EXIT_OPAQUE_ECHO:-1}"
      EXIT_OPAQUE_SINK_ADDR: "${EXIT_OPAQUE_SINK_ADDR:-}"
      EXIT_OPAQUE_SOURCE_ADDR: "${EXIT_OPAQUE_SOURCE_ADDR:-}"
      EXIT_TOKEN_PROOF_REPLAY_GUARD: "${EXIT_TOKEN_PROOF_REPLAY_GUARD:-1}"
      EXIT_TOKEN_PROOF_REPLAY_STORE_FILE: "${EXIT_TOKEN_PROOF_REPLAY_STORE_FILE:-}"
      EXIT_TOKEN_PROOF_REPLAY_REDIS_ADDR: "${EXIT_TOKEN_PROOF_REPLAY_REDIS_ADDR:-}"
      EXIT_TOKEN_PROOF_REPLAY_REDIS_PASSWORD: "${EXIT_TOKEN_PROOF_REPLAY_REDIS_PASSWORD:-}"
      EXIT_TOKEN_PROOF_REPLAY_REDIS_DB: "${EXIT_TOKEN_PROOF_REPLAY_REDIS_DB:-0}"
      EXIT_TOKEN_PROOF_REPLAY_REDIS_TLS: "${EXIT_TOKEN_PROOF_REPLAY_REDIS_TLS:-0}"
      EXIT_TOKEN_PROOF_REPLAY_REDIS_PREFIX: "${EXIT_TOKEN_PROOF_REPLAY_REDIS_PREFIX:-gpm:exit:token-replay:}"
      EXIT_TOKEN_PROOF_REPLAY_REDIS_DIAL_TIMEOUT_SEC: "${EXIT_TOKEN_PROOF_REPLAY_REDIS_DIAL_TIMEOUT_SEC:-5}"
      EXIT_PEER_REBIND_SEC: "${EXIT_PEER_REBIND_SEC:-0}"
      EXIT_STARTUP_SYNC_TIMEOUT_SEC: "${EXIT_STARTUP_SYNC_TIMEOUT_SEC:-0}"
      SETTLEMENT_CHAIN_ADAPTER: "${SETTLEMENT_CHAIN_ADAPTER:-}"
      COSMOS_SETTLEMENT_ENDPOINT: "${COSMOS_SETTLEMENT_ENDPOINT:-}"
      COSMOS_SETTLEMENT_API_KEY: "${COSMOS_SETTLEMENT_API_KEY:-}"
      COSMOS_SETTLEMENT_QUEUE_SIZE: "${COSMOS_SETTLEMENT_QUEUE_SIZE:-}"
      COSMOS_SETTLEMENT_MAX_RETRIES: "${COSMOS_SETTLEMENT_MAX_RETRIES:-}"
      COSMOS_SETTLEMENT_BASE_BACKOFF_MS: "${COSMOS_SETTLEMENT_BASE_BACKOFF_MS:-}"
      COSMOS_SETTLEMENT_HTTP_TIMEOUT_MS: "${COSMOS_SETTLEMENT_HTTP_TIMEOUT_MS:-}"
      COSMOS_SETTLEMENT_SUBMIT_MODE: "${COSMOS_SETTLEMENT_SUBMIT_MODE:-}"
      COSMOS_SETTLEMENT_TRUSTED_BRIDGE_FINALITY: "${COSMOS_SETTLEMENT_TRUSTED_BRIDGE_FINALITY:-0}"
      COSMOS_SETTLEMENT_REWARD_PROOF_AUTH_TOKEN: "${COSMOS_SETTLEMENT_REWARD_PROOF_AUTH_TOKEN:-}"
      COSMOS_SETTLEMENT_FINALITY_AUTH_TOKEN: "${COSMOS_SETTLEMENT_FINALITY_AUTH_TOKEN:-}"
      COSMOS_SETTLEMENT_REWARD_PROOF_VERIFIER_ID: "${COSMOS_SETTLEMENT_REWARD_PROOF_VERIFIER_ID:-}"
      MTLS_ENABLE: "${MTLS_ENABLE:-0}"
      MTLS_SERVER_CERT_FILE: "${MTLS_ENTRY_EXIT_SERVER_CERT_FILE:-/app/tls/node.crt}"
      MTLS_SERVER_KEY_FILE: "${MTLS_ENTRY_EXIT_SERVER_KEY_FILE:-/app/tls/node.key}"
      MTLS_CERT_FILE: "${MTLS_ENTRY_EXIT_CERT_FILE:-/app/tls/node.crt}"
      MTLS_KEY_FILE: "${MTLS_ENTRY_EXIT_KEY_FILE:-/app/tls/node.key}"
      MTLS_CA_FILE: "${MTLS_CA_FILE:-/app/tls/ca.crt}"
      MTLS_CLIENT_CERT_FILE: "${MTLS_ENTRY_EXIT_CLIENT_CERT_FILE:-/app/tls/client.crt}"
      MTLS_CLIENT_KEY_FILE: "${MTLS_ENTRY_EXIT_CLIENT_KEY_FILE:-/app/tls/client.key}"
      MTLS_REQUIRE_CLIENT_CERT: "${MTLS_REQUIRE_CLIENT_CERT:-1}"
      MTLS_MIN_VERSION: "${MTLS_MIN_VERSION:-1.3}"
    volumes:
      - ./data/entry-exit:/app/data
      - ./tls:/app/tls:ro
    user: "${ENTRY_EXIT_USER:-nodeuser}"
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    ports:
      - "${ENTRY_PUBLISHED_BIND_ADDR:-127.0.0.1}:${ENTRY_PUBLISHED_PORT:-8083}:8083"
      - "${EXIT_PUBLISHED_BIND_ADDR:-127.0.0.1}:${EXIT_PUBLISHED_PORT:-8084}:8084"
      - "${ENTRY_UDP_PUBLISHED_BIND_ADDR:-127.0.0.1}:${ENTRY_UDP_PUBLISHED_PORT:-51820}:51820/udp"
      - "${EXIT_UDP_PUBLISHED_BIND_ADDR:-127.0.0.1}:${EXIT_UDP_PUBLISHED_PORT:-51821}:51821/udp"
    restart: unless-stopped

  middle:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["--middle"]
    depends_on:
      - entry-exit
    environment:
      MIDDLE_ADDR: "0.0.0.0:8085"
      MIDDLE_DATA_ADDR: "0.0.0.0:51822"
      MIDDLE_ENTRY_DATA_ADDR: "${MIDDLE_ENTRY_DATA_ADDR:-entry-exit:51820}"
      MIDDLE_EXIT_DATA_ADDR: "${MIDDLE_EXIT_DATA_ADDR:-entry-exit:51821}"
      MIDDLE_OBSERVED_FILE: "${MIDDLE_OBSERVED_FILE:-/app/data/middle_observed.txt}"
      MIDDLE_READY_FILE: "${MIDDLE_READY_FILE:-/app/data/middle_ready.txt}"
    volumes:
      - ./data/middle:/app/data
    ports:
      - "${MIDDLE_PUBLISHED_BIND_ADDR:-127.0.0.1}:${MIDDLE_PUBLISHED_PORT:-8085}:8085"
      - "${MIDDLE_UDP_PUBLISHED_BIND_ADDR:-127.0.0.1}:${MIDDLE_UDP_PUBLISHED_PORT:-51822}:51822/udp"
    restart: unless-stopped

  client-demo:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["--client"]
    depends_on:
      - directory
      - issuer
      - entry-exit
    environment:
      DIRECTORY_URL: "${CLIENT_DIRECTORY_URL:-http://directory:8081}"
      ISSUER_URL: "${CLIENT_ISSUER_URL:-http://issuer:8082}"
      ENTRY_URL: "${CLIENT_ENTRY_URL:-http://entry-exit:8083}"
      EXIT_CONTROL_URL: "${CLIENT_EXIT_CONTROL_URL:-http://entry-exit:8084}"
      CLIENT_BOOTSTRAP_INTERVAL_SEC: "5"
      MTLS_ENABLE: "${MTLS_ENABLE:-0}"
      MTLS_CERT_FILE: "${MTLS_CLIENT_CERT_FILE:-/app/tls/client.crt}"
      MTLS_KEY_FILE: "${MTLS_CLIENT_KEY_FILE:-/app/tls/client.key}"
      MTLS_CA_FILE: "${MTLS_CA_FILE:-/app/tls/ca.crt}"
      MTLS_MIN_VERSION: "${MTLS_MIN_VERSION:-1.3}"
    profiles:
      - demo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./tls:/app/tls:ro
    restart: "no"
