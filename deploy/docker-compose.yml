services:
  directory:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["--directory"]
    environment:
      DIRECTORY_ADDR: "0.0.0.0:8081"
      DIRECTORY_PUBLIC_URL: "${DIRECTORY_PUBLIC_URL:-http://directory:8081}"
      DIRECTORY_OPERATOR_ID: "${DIRECTORY_OPERATOR_ID:-op-main}"
      ENTRY_RELAY_ID: "${ENTRY_RELAY_ID:-entry-local-1}"
      EXIT_RELAY_ID: "${EXIT_RELAY_ID:-exit-local-1}"
      ENTRY_URL: "${ENTRY_URL_PUBLIC:-http://entry-exit:8083}"
      EXIT_CONTROL_URL: "${EXIT_CONTROL_URL_PUBLIC:-http://entry-exit:8084}"
      ENTRY_ENDPOINT: "${ENTRY_ENDPOINT_PUBLIC:-entry-exit:51820}"
      EXIT_ENDPOINT: "${EXIT_ENDPOINT_PUBLIC:-entry-exit:51821}"
      DIRECTORY_PEERS: "${DIRECTORY_PEERS:-}"
      DIRECTORY_SYNC_SEC: "${DIRECTORY_SYNC_SEC:-0}"
      DIRECTORY_GOSSIP_SEC: "${DIRECTORY_GOSSIP_SEC:-0}"
      DIRECTORY_GOSSIP_FANOUT: "${DIRECTORY_GOSSIP_FANOUT:-2}"
      DIRECTORY_MIN_OPERATORS: "${DIRECTORY_MIN_OPERATORS:-1}"
      DIRECTORY_MIN_RELAY_VOTES: "${DIRECTORY_MIN_RELAY_VOTES:-1}"
      DIRECTORY_PEER_DISCOVERY: "${DIRECTORY_PEER_DISCOVERY:-1}"
      DIRECTORY_PEER_MIN_OPERATORS: "${DIRECTORY_PEER_MIN_OPERATORS:-1}"
      DIRECTORY_PEER_MIN_VOTES: "${DIRECTORY_PEER_MIN_VOTES:-1}"
      DIRECTORY_PEER_DISCOVERY_MIN_VOTES: "${DIRECTORY_PEER_DISCOVERY_MIN_VOTES:-1}"
      DIRECTORY_PEER_DISCOVERY_REQUIRE_HINT: "${DIRECTORY_PEER_DISCOVERY_REQUIRE_HINT:-0}"
      DIRECTORY_PEER_DISCOVERY_MAX_PER_SOURCE: "${DIRECTORY_PEER_DISCOVERY_MAX_PER_SOURCE:-0}"
      DIRECTORY_PEER_DISCOVERY_MAX_PER_OPERATOR: "${DIRECTORY_PEER_DISCOVERY_MAX_PER_OPERATOR:-0}"
      DIRECTORY_PEER_DISCOVERY_FAIL_THRESHOLD: "${DIRECTORY_PEER_DISCOVERY_FAIL_THRESHOLD:-3}"
      DIRECTORY_PEER_DISCOVERY_BACKOFF_SEC: "${DIRECTORY_PEER_DISCOVERY_BACKOFF_SEC:-60}"
      DIRECTORY_PEER_DISCOVERY_MAX_BACKOFF_SEC: "${DIRECTORY_PEER_DISCOVERY_MAX_BACKOFF_SEC:-900}"
      DIRECTORY_ADJUDICATION_META_MIN_VOTES: "${DIRECTORY_ADJUDICATION_META_MIN_VOTES:-1}"
      DIRECTORY_FINAL_DISPUTE_MIN_VOTES: "${DIRECTORY_FINAL_DISPUTE_MIN_VOTES:-1}"
      DIRECTORY_FINAL_APPEAL_MIN_VOTES: "${DIRECTORY_FINAL_APPEAL_MIN_VOTES:-1}"
      DIRECTORY_FINAL_ADJUDICATION_MIN_OPERATORS: "${DIRECTORY_FINAL_ADJUDICATION_MIN_OPERATORS:-1}"
      DIRECTORY_FINAL_ADJUDICATION_MIN_SOURCES: "${DIRECTORY_FINAL_ADJUDICATION_MIN_SOURCES:-1}"
      DIRECTORY_FINAL_ADJUDICATION_MIN_RATIO: "${DIRECTORY_FINAL_ADJUDICATION_MIN_RATIO:-0.5}"
      DIRECTORY_DISPUTE_MAX_TTL_SEC: "${DIRECTORY_DISPUTE_MAX_TTL_SEC:-604800}"
      DIRECTORY_APPEAL_MAX_TTL_SEC: "${DIRECTORY_APPEAL_MAX_TTL_SEC:-604800}"
      DIRECTORY_ISSUER_TRUST_URLS: "${DIRECTORY_ISSUER_TRUST_URLS:-}"
      DIRECTORY_PROVIDER_ISSUER_URLS: "${DIRECTORY_PROVIDER_ISSUER_URLS:-}"
      DIRECTORY_ISSUER_MIN_OPERATORS: "${DIRECTORY_ISSUER_MIN_OPERATORS:-1}"
      DIRECTORY_ISSUER_TRUST_MIN_VOTES: "${DIRECTORY_ISSUER_TRUST_MIN_VOTES:-1}"
      DIRECTORY_ISSUER_DISPUTE_MIN_VOTES: "${DIRECTORY_ISSUER_DISPUTE_MIN_VOTES:-1}"
      DIRECTORY_ISSUER_APPEAL_MIN_VOTES: "${DIRECTORY_ISSUER_APPEAL_MIN_VOTES:-1}"
      DIRECTORY_PROVIDER_RELAY_MAX_TTL_SEC: "${DIRECTORY_PROVIDER_RELAY_MAX_TTL_SEC:-300}"
      DIRECTORY_PROVIDER_MIN_ENTRY_TIER: "${DIRECTORY_PROVIDER_MIN_ENTRY_TIER:-1}"
      DIRECTORY_PROVIDER_MIN_EXIT_TIER: "${DIRECTORY_PROVIDER_MIN_EXIT_TIER:-1}"
      DIRECTORY_PROVIDER_MAX_RELAYS_PER_OPERATOR: "${DIRECTORY_PROVIDER_MAX_RELAYS_PER_OPERATOR:-0}"
      DIRECTORY_PROVIDER_SPLIT_ROLES: "${DIRECTORY_PROVIDER_SPLIT_ROLES:-0}"
      DIRECTORY_PEER_TRUST_STRICT: "${DIRECTORY_PEER_TRUST_STRICT:-0}"
      DIRECTORY_PEER_TRUST_TOFU: "${DIRECTORY_PEER_TRUST_TOFU:-1}"
      DIRECTORY_KEY_ROTATE_SEC: "${DIRECTORY_KEY_ROTATE_SEC:-0}"
      DIRECTORY_KEY_HISTORY: "${DIRECTORY_KEY_HISTORY:-3}"
      DIRECTORY_ADMIN_TOKEN: "${DIRECTORY_ADMIN_TOKEN:-}"
      BETA_STRICT_MODE: "${BETA_STRICT_MODE:-0}"
      PROD_STRICT_MODE: "${PROD_STRICT_MODE:-0}"
      DIRECTORY_PRIVATE_KEY_FILE: "${DIRECTORY_PRIVATE_KEY_FILE:-/app/data/directory_ed25519.key}"
      DIRECTORY_PREVIOUS_PUBKEYS_FILE: "${DIRECTORY_PREVIOUS_PUBKEYS_FILE:-/app/data/directory_previous_pubkeys.txt}"
      MTLS_ENABLE: "${MTLS_ENABLE:-0}"
      MTLS_CERT_FILE: "${MTLS_DIRECTORY_CERT_FILE:-/app/tls/node.crt}"
      MTLS_KEY_FILE: "${MTLS_DIRECTORY_KEY_FILE:-/app/tls/node.key}"
      MTLS_CA_FILE: "${MTLS_CA_FILE:-/app/tls/ca.crt}"
      MTLS_REQUIRE_CLIENT_CERT: "${MTLS_REQUIRE_CLIENT_CERT:-1}"
      MTLS_MIN_VERSION: "${MTLS_MIN_VERSION:-1.3}"
    volumes:
      - ./data/directory:/app/data
      - ./tls:/app/tls:ro
    ports:
      - "8081:8081"
    restart: unless-stopped

  issuer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["--issuer"]
    environment:
      ISSUER_ADDR: "0.0.0.0:8082"
      ISSUER_ID: "${ISSUER_ID:-issuer-main}"
      ISSUER_PRIVATE_KEY_FILE: "${ISSUER_PRIVATE_KEY_FILE:-/app/data/issuer_ed25519.key}"
      ISSUER_PREVIOUS_PUBKEYS_FILE: "${ISSUER_PREVIOUS_PUBKEYS_FILE:-/app/data/issuer_previous_pubkeys.txt}"
      ISSUER_EPOCHS_FILE: "${ISSUER_EPOCHS_FILE:-/app/data/issuer_epochs.json}"
      ISSUER_SUBJECTS_FILE: "${ISSUER_SUBJECTS_FILE:-/app/data/issuer_subjects.json}"
      ISSUER_REVOCATIONS_FILE: "${ISSUER_REVOCATIONS_FILE:-/app/data/issuer_revocations.json}"
      ISSUER_ANON_REVOCATIONS_FILE: "${ISSUER_ANON_REVOCATIONS_FILE:-/app/data/issuer_anon_revocations.json}"
      ISSUER_ANON_DISPUTES_FILE: "${ISSUER_ANON_DISPUTES_FILE:-/app/data/issuer_anon_disputes.json}"
      ISSUER_AUDIT_FILE: "${ISSUER_AUDIT_FILE:-/app/data/issuer_audit.json}"
      ISSUER_ADMIN_TOKEN: "${ISSUER_ADMIN_TOKEN:-}"
      ISSUER_ADMIN_ALLOW_TOKEN: "${ISSUER_ADMIN_ALLOW_TOKEN:-1}"
      ISSUER_ADMIN_REQUIRE_SIGNED: "${ISSUER_ADMIN_REQUIRE_SIGNED:-0}"
      ISSUER_ADMIN_SIGNED_WINDOW_SEC: "${ISSUER_ADMIN_SIGNED_WINDOW_SEC:-90}"
      ISSUER_ADMIN_SIGNING_KEYS_FILE: "${ISSUER_ADMIN_SIGNING_KEYS_FILE:-}"
      ISSUER_CLIENT_ALLOWLIST_ONLY: "${ISSUER_CLIENT_ALLOWLIST_ONLY:-0}"
      ISSUER_ALLOW_ANON_CRED: "${ISSUER_ALLOW_ANON_CRED:-1}"
      ISSUER_ANON_CRED_EXPOSE_ID: "${ISSUER_ANON_CRED_EXPOSE_ID:-1}"
      ISSUER_TOKEN_TTL_SEC: "${ISSUER_TOKEN_TTL_SEC:-600}"
      ISSUER_KEY_ROTATE_SEC: "${ISSUER_KEY_ROTATE_SEC:-0}"
      ISSUER_KEY_HISTORY: "${ISSUER_KEY_HISTORY:-3}"
      BETA_STRICT_MODE: "${BETA_STRICT_MODE:-0}"
      PROD_STRICT_MODE: "${PROD_STRICT_MODE:-0}"
      MTLS_ENABLE: "${MTLS_ENABLE:-0}"
      MTLS_CERT_FILE: "${MTLS_ISSUER_CERT_FILE:-/app/tls/node.crt}"
      MTLS_KEY_FILE: "${MTLS_ISSUER_KEY_FILE:-/app/tls/node.key}"
      MTLS_CA_FILE: "${MTLS_CA_FILE:-/app/tls/ca.crt}"
      MTLS_REQUIRE_CLIENT_CERT: "${MTLS_REQUIRE_CLIENT_CERT:-1}"
      MTLS_MIN_VERSION: "${MTLS_MIN_VERSION:-1.3}"
    volumes:
      - ./data/issuer:/app/data
      - ./tls:/app/tls:ro
    ports:
      - "8082:8082"
    restart: unless-stopped

  entry-exit:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["--entry", "--exit"]
    depends_on:
      - directory
      - issuer
    environment:
      ENTRY_ADDR: "0.0.0.0:8083"
      EXIT_ADDR: "0.0.0.0:8084"
      ENTRY_DATA_ADDR: "0.0.0.0:51820"
      EXIT_DATA_ADDR: "0.0.0.0:51821"
      DIRECTORY_URL: "${CORE_DIRECTORY_URL:-http://directory:8081}"
      DIRECTORY_URLS: "${DIRECTORY_URLS:-}"
      DIRECTORY_MIN_SOURCES: "${DIRECTORY_MIN_SOURCES:-1}"
      DIRECTORY_MIN_OPERATORS: "${DIRECTORY_MIN_OPERATORS:-1}"
      DIRECTORY_MIN_RELAY_VOTES: "${DIRECTORY_MIN_RELAY_VOTES:-1}"
      DIRECTORY_TRUST_STRICT: "${DIRECTORY_TRUST_STRICT:-0}"
      DIRECTORY_TRUST_TOFU: "${DIRECTORY_TRUST_TOFU:-1}"
      ISSUER_URL: "${CORE_ISSUER_URL:-http://issuer:8082}"
      ISSUER_URLS: "${ISSUER_URLS:-}"
      DATA_PLANE_MODE: "${DATA_PLANE_MODE:-json}"
      BETA_STRICT_MODE: "${BETA_STRICT_MODE:-0}"
      PROD_STRICT_MODE: "${PROD_STRICT_MODE:-0}"
      ENTRY_OPEN_RPS: "20"
      ENTRY_PUZZLE_DIFFICULTY: "1"
      ENTRY_PUZZLE_SECRET: "${ENTRY_PUZZLE_SECRET:-entry-secret-default}"
      ENTRY_BAN_THRESHOLD: "3"
      ENTRY_BAN_SEC: "45"
      ENTRY_OPERATOR_ID: "${ENTRY_OPERATOR_ID:-}"
      ENTRY_DIRECTORY_MIN_SOURCES: "${ENTRY_DIRECTORY_MIN_SOURCES:-1}"
      ENTRY_DIRECTORY_MIN_OPERATORS: "${ENTRY_DIRECTORY_MIN_OPERATORS:-1}"
      ENTRY_DIRECTORY_MIN_RELAY_VOTES: "${ENTRY_DIRECTORY_MIN_RELAY_VOTES:-1}"
      ENTRY_DIRECTORY_TRUST_STRICT: "${ENTRY_DIRECTORY_TRUST_STRICT:-0}"
      ENTRY_DIRECTORY_TRUST_TOFU: "${ENTRY_DIRECTORY_TRUST_TOFU:-1}"
      ENTRY_REQUIRE_DISTINCT_EXIT_OPERATOR: "${ENTRY_REQUIRE_DISTINCT_EXIT_OPERATOR:-0}"
      ENTRY_LIVE_WG_MODE: "${ENTRY_LIVE_WG_MODE:-0}"
      EXIT_REVOCATION_REFRESH_SEC: "15"
      EXIT_ISSUER_MIN_SOURCES: "${EXIT_ISSUER_MIN_SOURCES:-1}"
      EXIT_ISSUER_MIN_OPERATORS: "${EXIT_ISSUER_MIN_OPERATORS:-1}"
      EXIT_ISSUER_REQUIRE_ID: "${EXIT_ISSUER_REQUIRE_ID:-0}"
      EXIT_ACCOUNTING_FILE: "/app/data/exit_accounting.json"
      WG_BACKEND: "${WG_BACKEND:-noop}"
      EXIT_WG_INTERFACE: "${EXIT_WG_INTERFACE:-wg-exit0}"
      EXIT_WG_PRIVATE_KEY_PATH: "${EXIT_WG_PRIVATE_KEY_PATH:-/app/data/exit_wg.key}"
      EXIT_WG_AUTO_CREATE_INTERFACE: "${EXIT_WG_AUTO_CREATE_INTERFACE:-0}"
      EXIT_WG_LISTEN_PORT: "${EXIT_WG_LISTEN_PORT:-51831}"
      EXIT_WG_KERNEL_PROXY: "${EXIT_WG_KERNEL_PROXY:-0}"
      EXIT_WG_KERNEL_PROXY_MAX_SESSIONS: "${EXIT_WG_KERNEL_PROXY_MAX_SESSIONS:-2048}"
      EXIT_WG_KERNEL_PROXY_IDLE_SEC: "${EXIT_WG_KERNEL_PROXY_IDLE_SEC:-120}"
      EXIT_LIVE_WG_MODE: "${EXIT_LIVE_WG_MODE:-0}"
      EXIT_OPAQUE_ECHO: "${EXIT_OPAQUE_ECHO:-1}"
      EXIT_OPAQUE_SINK_ADDR: "${EXIT_OPAQUE_SINK_ADDR:-}"
      EXIT_OPAQUE_SOURCE_ADDR: "${EXIT_OPAQUE_SOURCE_ADDR:-}"
      EXIT_TOKEN_PROOF_REPLAY_GUARD: "${EXIT_TOKEN_PROOF_REPLAY_GUARD:-0}"
      EXIT_PEER_REBIND_SEC: "${EXIT_PEER_REBIND_SEC:-0}"
      EXIT_STARTUP_SYNC_TIMEOUT_SEC: "${EXIT_STARTUP_SYNC_TIMEOUT_SEC:-0}"
      MTLS_ENABLE: "${MTLS_ENABLE:-0}"
      MTLS_CERT_FILE: "${MTLS_ENTRY_EXIT_CERT_FILE:-/app/tls/node.crt}"
      MTLS_KEY_FILE: "${MTLS_ENTRY_EXIT_KEY_FILE:-/app/tls/node.key}"
      MTLS_CA_FILE: "${MTLS_CA_FILE:-/app/tls/ca.crt}"
      MTLS_REQUIRE_CLIENT_CERT: "${MTLS_REQUIRE_CLIENT_CERT:-1}"
      MTLS_MIN_VERSION: "${MTLS_MIN_VERSION:-1.3}"
    volumes:
      - ./data/entry-exit:/app/data
      - ./tls:/app/tls:ro
    user: "${ENTRY_EXIT_USER:-nodeuser}"
    privileged: ${ENTRY_EXIT_PRIVILEGED:-false}
    ports:
      - "8083:8083"
      - "8084:8084"
      - "51820:51820/udp"
      - "51821:51821/udp"
    restart: unless-stopped

  client-demo:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["--client"]
    depends_on:
      - directory
      - issuer
      - entry-exit
    environment:
      DIRECTORY_URL: "${CLIENT_DIRECTORY_URL:-http://directory:8081}"
      ISSUER_URL: "${CLIENT_ISSUER_URL:-http://issuer:8082}"
      ENTRY_URL: "${CLIENT_ENTRY_URL:-http://entry-exit:8083}"
      EXIT_CONTROL_URL: "${CLIENT_EXIT_CONTROL_URL:-http://entry-exit:8084}"
      CLIENT_BOOTSTRAP_INTERVAL_SEC: "5"
      MTLS_ENABLE: "${MTLS_ENABLE:-0}"
      MTLS_CERT_FILE: "${MTLS_CLIENT_CERT_FILE:-/app/tls/client.crt}"
      MTLS_KEY_FILE: "${MTLS_CLIENT_KEY_FILE:-/app/tls/client.key}"
      MTLS_CA_FILE: "${MTLS_CA_FILE:-/app/tls/ca.crt}"
      MTLS_MIN_VERSION: "${MTLS_MIN_VERSION:-1.3}"
    profiles:
      - demo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./tls:/app/tls:ro
    restart: "no"
