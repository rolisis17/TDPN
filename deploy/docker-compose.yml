      DIRECTORY_TRUST_STRICT: "${DIRECTORY_TRUST_STRICT:-0}"
      DIRECTORY_TRUST_TOFU: "${DIRECTORY_TRUST_TOFU:-0}"
      ISSUER_URL: "${ISSUER_URL:-http://issuer:8082}"
