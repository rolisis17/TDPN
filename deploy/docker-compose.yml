      MIDDLE_OPERATOR_ID: "${MIDDLE_OPERATOR_ID:-}"
      MIDDLE_ENDPOINT_PUBLIC: "${MIDDLE_ENDPOINT_PUBLIC:-}"
      MIDDLE_CONTROL_URL_PUBLIC: "${MIDDLE_CONTROL_URL_PUBLIC:-}"
      MIDDLE_COUNTRY_CODE: "${MIDDLE_COUNTRY_CODE:-ZZ}"
      MIDDLE_REGION: "${MIDDLE_REGION:-local}"
      MIDDLE_GEO_CONFIDENCE: "${MIDDLE_GEO_CONFIDENCE:-1}"
      MIDDLE_REPUTATION_SCORE: "${MIDDLE_REPUTATION_SCORE:-0.82}"
      MIDDLE_UPTIME_SCORE: "${MIDDLE_UPTIME_SCORE:-0.91}"
      MIDDLE_CAPACITY_SCORE: "${MIDDLE_CAPACITY_SCORE:-0.84}"
