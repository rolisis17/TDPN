name: security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: codeql-go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: go
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225

      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.22"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0

      - name: Block local runtime artifacts in git index
        run: |
          if git ls-files | grep -E '^User/globalStorage/'; then
            echo "Tracked local runtime artifacts detected under User/globalStorage/."
            echo "Remove them from git and keep them ignored."
            exit 1
          fi

      - name: Block tracked secret-like docs/deploy artifacts
        run: ./scripts/security_secret_guard.sh

      - name: Run govulncheck
        run: govulncheck ./...
