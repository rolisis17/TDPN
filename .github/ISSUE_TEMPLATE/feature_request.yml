name: Feature request
description: Propose a feature or enhancement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: input
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Security, privacy, performance, ops impact.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked for existing feature requests
          required: true
