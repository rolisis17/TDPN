name: Bug report
description: Report a reproducible bug
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, confirm this is not a security issue. For vulnerabilities, use SECURITY.md.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the bug
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Go version, Docker version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / evidence
      description: Redact tokens, keys, and private identifiers.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I removed secrets/tokens from logs
          required: true
        - label: I searched for existing issues
          required: true
